<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - DigitalBox</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">
    <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-2xl w-full max-w-sm">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-500">Admin Dashboard</h2>
        
        {% if request.query_params.error %}
        <div class="bg-red-500/20 text-red-400 border border-red-500/50 p-3 rounded-lg mb-4 text-sm text-center">
            {{ request.query_params.error }}
        </div>
        {% endif %}

        <form action="/admin/login" method="POST">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-400 mb-2">Master Password</label>
                <input type="password" name="password" required class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-500/20">Login</button>
        </form>
    </div>
</body>
</html>
